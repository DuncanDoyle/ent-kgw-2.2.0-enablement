    #     istioDiscoveryAddress: <istiod-service-address> # such as istiod-main.istio-system.svc:15012
    #     istioMetaClusterId: <cluster-ID> ## such as the cluster name
    #     istioMetaMeshId: <meta-mesh-ID> ## such as the cluster name
