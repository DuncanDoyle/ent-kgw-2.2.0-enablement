apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ip-filter
  namespace: waf
spec:
  parentRefs:
  - name: gw
    namespace: waf
  hostnames:
  - "ip-filter.example.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: httpbin
      namespace: waf-httpbin
      port: 8000
