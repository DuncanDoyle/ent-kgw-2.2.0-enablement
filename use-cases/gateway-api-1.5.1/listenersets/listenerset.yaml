kind: ListenerSet
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: gw-listenerset
  namespace: gwapi151
spec:
  parentRef:
    # Bind to a Gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    name: gw
    namespace: gwapi151
  listeners:
    - protocol: HTTP
      port: 80
      name: http-api
      hostname: api.example.com
      allowedRoutes:
        namespaces:
          from: Same
          # from: All
          # from: Selector # Only allow routes from namespaces with the following label set.
          # selector:
          #   matchLabels:
          #     shared-gateway-access: "true"
        kinds:
        - kind: HTTPRoute
    - protocol: TLS
      port: 6443
      name: tls
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: Same
          # from: All
          # from: Selector # Only allow routes from namespaces with the following label set.
          # selector:
          #   matchLabels:
          #     shared-gateway-access: "true"
        kinds:
        - kind: TLSRoute
    - protocol: HTTPS
      port: 443
      name: https-mtls
      hostname: mtls.example.com
      tls:
        mode: Terminate
        certificateRefs:
        - name: gateway-server-tls
      allowedRoutes:
        namespaces:
          from: Same
        kinds:
        - kind: HTTPRoute