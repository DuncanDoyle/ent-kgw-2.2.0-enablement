apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-holepunch
  namespace: acl
spec:
  parentRefs:
  - name: gw
    namespace: acl
  hostnames:
  - "acl.example.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /uuid
    backendRefs:
    - name: httpbin
      namespace: acl-httpbin
      port: 8000
